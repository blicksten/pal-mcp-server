---
# Exclude patterns (kept from original)
exclude: |
  (?x)^(
    \.git/|
    \.venv/|
    venv/|
    \.pal_venv/|
    __pycache__/|
    \.pytest_cache/|
    logs/|
    dist/|
    build/|
    test_simulation_files/
  )

repos:
  # --- Generic file hygiene ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]

  # --- Python: Ruff lint + format (replaces Black + isort) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # --- Shell: ShellCheck (shellcheck-py: bundled binary, no Docker needed on Windows) ---
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]

  # --- Secrets detection ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks
